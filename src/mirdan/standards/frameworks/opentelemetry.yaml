# Standards for OpenTelemetry (opentelemetry-sdk) - verified 2026-03-05
principles:
  - Use tracer.start_as_current_span() context manager for automatic span lifecycle management
  - Follow semantic conventions for span attributes - use SpanAttributes.* constants not raw strings
  - Set the service.name resource attribute at TracerProvider initialization for service identification
  - Use BatchSpanProcessor in production - SimpleSpanProcessor is for development/debugging only
  - Propagate context automatically using the W3C TraceContext format via inject()/extract() with carrier dicts
  - Add baggage for cross-service metadata that does not belong in span attributes
  - Use span events (span.add_event()) for significant moments within a span instead of creating child spans
  - Always end spans explicitly when not using the context manager (span.end() in finally block)

forbidden:
  - SimpleSpanProcessor in production - it blocks on every span export, causing performance degradation
  - Not setting service.name resource attribute - makes traces unidentifiable in backends like Jaeger/Tempo
  - Manual context propagation via custom headers instead of W3C TraceContext
  - Custom attribute key names that duplicate or conflict with OpenTelemetry semantic conventions
  - Recording sensitive PII data (tokens, passwords, emails) as span attributes

patterns:
  provider_setup: "resource = Resource({SERVICE_NAME: 'my-service', SERVICE_VERSION: '1.0.0'})\nprovider = TracerProvider(resource=resource)\nprovider.add_span_processor(BatchSpanProcessor(OTLPSpanExporter(endpoint=OTLP_ENDPOINT)))\ntrace.set_tracer_provider(provider)"
  trace_context: "tracer = trace.get_tracer(__name__)\nwith tracer.start_as_current_span('operation_name') as span:\n    span.set_attribute(SpanAttributes.HTTP_METHOD, 'GET')\n    result = do_work()\n    span.set_attribute(SpanAttributes.HTTP_STATUS_CODE, 200)"
  context_propagation: "from opentelemetry.propagate import inject, extract\nheaders = {}; inject(headers)  # outgoing\ncontext = extract(request.headers)  # incoming"
  span_events: "span.add_event('cache_miss', attributes={'cache.key': cache_key})"
  baggage: "from opentelemetry.baggage import get_baggage, set_baggage\nctx = set_baggage('user.tenant', tenant_id)"
  exception_recording: "with tracer.start_as_current_span('process') as span:\n    try:\n        process()\n    except Exception as e:\n        span.record_exception(e); span.set_status(Status(StatusCode.ERROR))\n        raise"
