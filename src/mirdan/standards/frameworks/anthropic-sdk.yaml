# Standards for Anthropic Python SDK >= 0.20 - verified 2026-03-05
principles:
  - Use client.messages.create() as the primary API - client.completions.create() was removed in 0.20
  - Use the typed client (anthropic.Anthropic() or anthropic.AsyncAnthropic()) never bare module-level calls
  - Use streaming via client.messages.stream() context manager for long-running generations to improve UX
  - Track token usage from response.usage (input_tokens, output_tokens) for cost monitoring and quota management
  - Use system prompt caching with cache_control type ephemeral for repeated system prompts to reduce latency and cost by up to 90%
  - Implement tool use with the tools parameter and handle tool_use content blocks in responses
  - Handle 429 rate limit and 529 overloaded errors with exponential backoff - Anthropic recommends 30-60s base delay
  - Use AsyncAnthropic for async contexts - never block the event loop with synchronous calls

forbidden:
  - client.completions.create() or anthropic.Completion - removed in SDK 0.20, migrate to client.messages.create()
  - Ignoring the response.stop_reason - always check for "end_turn" vs "tool_use" vs "max_tokens" to handle truncation
  - Not handling AnthropicError, RateLimitError, and OverloadedError in production code
  - Hardcoding model names as strings without a constant - use a config value so model upgrades are centralized
  - Concatenating conversation history manually - maintain a messages list and append to it

patterns:
  basic_message: "response = client.messages.create(model='claude-sonnet-4-6', max_tokens=1024, messages=[{'role': 'user', 'content': prompt}])"
  streaming: "with client.messages.stream(model=model, max_tokens=max_tokens, messages=messages) as stream:\n    for text in stream.text_stream:\n        yield text"
  tool_use: "tools=[{'name': 'tool_name', 'description': '...', 'input_schema': {'type': 'object', 'properties': {...}}}]"
  system_caching: "system=[{'type': 'text', 'text': system_prompt, 'cache_control': {'type': 'ephemeral'}}]"
  token_tracking: "usage = response.usage; cost = usage.input_tokens * INPUT_RATE + usage.output_tokens * OUTPUT_RATE"
  error_handling: "try:\n    response = client.messages.create(...)\nexcept anthropic.OverloadedError:\n    time.sleep(60); retry()"
