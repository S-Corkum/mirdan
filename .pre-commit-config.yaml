# .pre-commit-config.yaml — mirdan contributor checks (mirror the CI "Lint" gate).
#
# Catches ruff lint + format issues locally before they reach CI. Hooks run the
# project's own ruff via `uv run`, so the version always matches CI — no drift
# between a passing pre-commit and a failing CI format check. Scoped to the same
# paths CI lints (`src/mirdan` + `tests`) so local and CI verdicts agree.
#
# One-time setup:
#   uv tool install pre-commit   # or: pipx install pre-commit
#   pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        files: ^(src/mirdan|tests)/
        require_serial: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^(src/mirdan|tests)/
        require_serial: true
